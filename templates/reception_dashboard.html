<!DOCTYPE html>
<html>
<head>
    <title>Reception Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Reception Dashboard</span>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h5>Total Patients</h5>
                <h3>{{ total_patients }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h5>Appointments</h5>
                <h3>{{ total_appointments }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h5>Waiting</h5>
                <h3>{{ waiting }}</h3>
            </div>
        </div>
    </div>

    <div class="d-grid gap-3">
        <a href="/register" class="btn btn-primary">Register Patient</a>
        <a href="/appointments" class="btn btn-success">Book Appointment</a>
        <a href="/queue" class="btn btn-warning">Manage Queue</a>
        <a href="/checkin" class="btn btn-info">Patient Check-In</a>
    </div>

</div>

</body>
</html>
