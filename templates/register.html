<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register Patient</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg">

                <div class="card-header bg-primary text-white text-center">

                    <h3>Patient Registration</h3>

                </div>

                <div class="card-body">

                    {% if error %}

                        <div class="alert alert-danger">
                            {{ error }}
                        </div>

                    {% endif %}

                    <form method="POST">

                        <!-- FIRST NAME -->
                        <div class="mb-3">

                            <label class="form-label">
                                First Name
                            </label>

                            <input
                                type="text"
                                name="first_name"
                                class="form-control"
                                required
                            >

                        </div>

                        <!-- LAST NAME -->
                        <div class="mb-3">

                            <label class="form-label">
                                Last Name
                            </label>

                            <input
                                type="text"
                                name="last_name"
                                class="form-control"
                                required
                            >

                        </div>

                        <!-- GENDER -->
                        <div class="mb-3">

                            <label class="form-label">
                                Gender
                            </label>

                            <select
                                name="gender"
                                class="form-select"
                                required
                            >

                                <option value="">
                                    Select Gender
                                </option>

                                <option value="Male">
                                    Male
                                </option>

                                <option value="Female">
                                    Female
                                </option>

                                <option value="Other">
                                    Other
                                </option>

                            </select>

                        </div>

                        <!-- DATE OF BIRTH -->
                        <div class="mb-3">

                            <label class="form-label">
                                Date of Birth
                            </label>

                            <input
                                type="date"
                                name="date_of_birth"
                                class="form-control"
                            >

                        </div>

                        <!-- PHONE -->
                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input
                                type="text"
                                name="phone"
                                class="form-control"
                                required
                            >

                        </div>

                        <!-- EMAIL -->
                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                            >

                        </div>

                        <!-- ADDRESS -->
                        <div class="mb-3">

                            <label class="form-label">
                                Address
                            </label>

                            <textarea
                                name="address"
                                class="form-control"
                                rows="3"
                            ></textarea>

                        </div>

                        <!-- EMERGENCY CONTACT -->
                        <div class="mb-3">

                            <label class="form-label">
                                Emergency Contact
                            </label>

                            <input
                                type="text"
                                name="emergency_contact"
                                class="form-control"
                            >

                        </div>

                        <!-- SUBMIT BUTTON -->
                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-primary"
                            >
                                Register Patient
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
