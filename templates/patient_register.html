<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Patient Registration</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">

                    <h3>Patient Registration</h3>

                </div>

                <div class="card-body">

                    {% if error %}

                        <div class="alert alert-danger">
                            {{ error }}
                        </div>

                    {% endif %}

                    <form method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>Username</label>

                                <input
                                    type="text"
                                    name="username"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>Password</label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    required
                                >

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label>First Name</label>

                                <input
                                    type="text"
                                    name="first_name"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="col-md-6 mb-3">

                                <label>Last Name</label>

                                <input
                                    type="text"
                                    name="last_name"
                                    class="form-control"
                                    required
                                >

                            </div>

                        </div>

                        <div class="mb-3">

                            <label>Gender</label>

                            <select
                                name="gender"
                                class="form-select"
                                required
                            >

                                <option value="">
                                    Select Gender
                                </option>

                                <option value="Male">
                                    Male
                                </option>

                                <option value="Female">
                                    Female
                                </option>

                                <option value="Other">
                                    Other
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label>Date of Birth</label>

                            <input
                                type="date"
                                name="date_of_birth"
                                class="form-control"
                            >

                        </div>

                        <div class="mb-3">

                            <label>Phone</label>

                            <input
                                type="text"
                                name="phone"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                            >

                        </div>

                        <div class="mb-3">

                            <label>Address</label>

                            <textarea
                                name="address"
                                class="form-control"
                            ></textarea>

                        </div>

                        <div class="mb-3">

                            <label>Emergency Contact</label>

                            <input
                                type="text"
                                name="emergency_contact"
                                class="form-control"
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Register
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
